name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_DEFAULT_REGION }}

      - name: Verify AWS connection
        run: aws sts get-caller-identity

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Create ECR repository if not exists
        run: |
          aws ecr describe-repositories --repository-names cloud-cost-forecaster 2>/dev/null || \
          aws ecr create-repository --repository-name cloud-cost-forecaster

      - name: Build and push Docker image to ECR
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $ECR_REGISTRY/cloud-cost-forecaster:$IMAGE_TAG .
          docker build -t $ECR_REGISTRY/cloud-cost-forecaster:latest .
          docker push $ECR_REGISTRY/cloud-cost-forecaster:$IMAGE_TAG
          docker push $ECR_REGISTRY/cloud-cost-forecaster:latest
          echo "Image pushed: $ECR_REGISTRY/cloud-cost-forecaster:$IMAGE_TAG"